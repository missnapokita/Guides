<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLBB Hero Guides</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Mobile Legends Database</p>
      <h1>MLBB Hero Guides</h1>
      <p class="subtitle">Hero guides, skills, counters, synergies, builds, emblems, calculator, and tier list.</p>
    </div>
    <a class="github-btn" href="https://github.com/p3hndrx/MLBB-API" target="_blank">API Source</a>
  </header>

  <nav class="tabs">
    <button class="tab active" data-page="heroes">Heroes</button>
    <button class="tab" data-page="builds">Best Build</button>
    <button class="tab" data-page="emblems">Best Emblem</button>
    <button class="tab" data-page="counters">Counters</button>
    <button class="tab" data-page="calculator">Stats Calculator</button>
    <button class="tab" data-page="tiers">Tier List</button>
  </nav>

  <main>
    <section class="toolbar">
      <input id="searchInput" type="text" placeholder="Search hero, role, lane..." />
      <select id="roleFilter">
        <option value="all">All Roles</option>
        <option value="tank">Tank</option>
        <option value="fighter">Fighter</option>
        <option value="assassin">Assassin</option>
        <option value="mage">Mage</option>
        <option value="marksman">Marksman</option>
        <option value="support">Support</option>
      </select>
    </section>

    <section id="pageTitle" class="page-title"></section>
    <section id="content" class="content-grid"></section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
