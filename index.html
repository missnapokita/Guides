<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLBB Hero Guides</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>MLBB Hero Guides</h1>
      <p>Heroes, Items, Emblems Database</p>
    </div>
  </header>

  <main>
    <section class="hero-section">
      <h2>Find Your Hero</h2>
      <input type="text" id="searchInput" placeholder="Search hero name..." />
      <div class="filters">
        <button onclick="filterRole('All')">All</button>
        <button onclick="filterRole('Tank')">Tank</button>
        <button onclick="filterRole('Fighter')">Fighter</button>
        <button onclick="filterRole('Assassin')">Assassin</button>
        <button onclick="filterRole('Mage')">Mage</button>
        <button onclick="filterRole('Marksman')">Marksman</button>
        <button onclick="filterRole('Support')">Support</button>
      </div>
    </section>

    <section id="heroGrid" class="grid"></section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box">
      <button class="close" onclick="closeModal()">×</button>
      <div id="modalContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
